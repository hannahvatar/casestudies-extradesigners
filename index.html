    #__bundler_thumbnail { position: fixed; inset: 0; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; background: #faf9f5; z-index: 9999; }

  <div id="__bundler_thumbnail"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200"><rect width="200" height="200" fill="#242320"></rect><text x="30" y="115" font-family="sans-serif" font-size="72" font-weight="800" fill="#3452FF">CS</text></svg></div>
  <div id="__bundler_loading">Unpacking...</div>

  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    // Nested page bundles (iframe targets). Each ships ONCE, in the ROOT
    // document's manifest; frame srcs carry an about:blank#<uuid> marker
    // instead of a substitutable uuid. Every document mints the blobs for
    // its OWN frames — from local text at the root, or text obtained from
    // its DIRECT parent over the relay protocol below — so each frame
    // navigation stays same-origin with its initiator and a deduped page
    // loads at any depth on any host, including a file:// download's
    // opaque origins (where a blob minted by one document cannot be
    // navigated to by another).
    const pageOrderEl = document.querySelector('script[type="__bundler/page_order"]');
    const pageOrder = pageOrderEl ? JSON.parse(pageOrderEl.textContent) : [];
    const pageSet = new Set(pageOrder);
    const pageTexts = {};

    // ── Nested-page text protocol (parent-chain relay) ──
    // Page bundles ship once, in the ROOT document's manifest. Every
    // document mints the blobs for its OWN frames, obtaining page text
    // through a strict parent-chain relay: a document only ever SENDS to
    // its direct parent (which, for every document the publisher's own
    // runtime minted, is another publisher document) and only ACCEPTS
    // text from that direct parent; requests from below are honored only
    // for the document's own child frames, and the ROOT never sends
    // upward at all. That last rule is load-bearing: the artifact host's
    // frame-ancestors allows claude.ai (and friends) to frame an
    // artifact, so window.top can be a FOREIGN document — a top-addressed
    // protocol would hand page uuids to that ancestor and accept forged
    // "page text" from it, minting attacker HTML as an artifact-origin
    // blob document. The chain never touches the ancestor: requests stop
    // at the root, replies are origin-addressed per hop (never '*' when
    // an origin exists), and both directions are origin-gated (on https
    // a foreign sender's origin can never equal this document's; in
    // opaque contexts — file:// — everything serializes as 'null', where
    // an embedded EXTERNAL frame still fails the gate by carrying its
    // own real origin, and a sandboxed child of such a frame is excluded
    // by the own-child-frames check plus uuid unguessability). Shape is
    // deny-by-default: one request form, one reply form, no error
    // replies.
    // window.origin is the SERIALIZED SECURITY origin ('null' in opaque
    // contexts such as a sandboxed preview iframe) — location.origin is
    // computed from the URL and stays 'https://…' even when the document
    // is sandboxed, which would misgate every opaque chain.
    const OWN_TARGET = /^https?:[/][/]/.test(window.origin || '')
      ? window.origin
      : '*';
    function trustedOrigin(e) {
      if (e.origin === window.origin) return true; // https chains; opaque==opaque
      // file:// trees: Chrome serializes the file document's origin as
      // 'file://' while the blob: documents it mints serialize as 'null',
      // so the two legitimate shapes can never string-match — accept the
      // pair in both directions. https origins never serialize as either,
      // and sender identity (own child frame / direct parent) is checked
      // separately.
      return (
        (e.origin === 'null' &&
          (window.origin === 'file://' ||
            window.location.protocol === 'file:')) ||
        (/^file:/.test(e.origin) && window.origin === 'null')
      );
    }
    // Non-empty only in the root document (nested bundles ship an empty
    // island), so it doubles as the root marker: the root answers from
    // local text and treats a miss as authoritative — never relaying to
    // its (possibly foreign) parent.
    const isPageRoot = pageOrder.length > 0;
    const blobUrls = {};
    const resourceBlobs = {};
    const UUID_SHAPE = /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/;
    const pendingFrames = {}; // uuid -> [{el, frag}] awaiting text for own frames
    const pendingRelays = {}; // uuid -> [childWindow] awaiting text to pass down
    function mountPage(el, frag, text) {
      const pageBlob = new Blob([text], { type: 'text/html' });
      const u = URL.createObjectURL(pageBlob);
      resourceBlobs[u] = pageBlob;
      el.src = u + frag;
    }
    function deliverPage(uuid, text) {
      const frames = pendingFrames[uuid];
      delete pendingFrames[uuid];
      if (frames) for (const f of frames) mountPage(f.el, f.frag, text);
      const relays = pendingRelays[uuid];
      delete pendingRelays[uuid];
      if (relays) {
        for (const cw of relays) {
          try { cw.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
        }
      }
    }
    function ownFrameWindows() {
      const out = [];
      for (const f of Array.from(document.querySelectorAll('iframe'))) {
        try { if (f.contentWindow) out.push(f.contentWindow); } catch (err) { /* detached */ }
      }
      return out;
    }
    window.addEventListener('message', function (e) {
      const d = e.data;
      if (!d || typeof d !== 'object' || !e.source) return;
      // Origin gate first; the structural checks below (own-child-frames
      // for requests, direct-parent + solicited-uuid for replies, the
      // root's never-relay rule) are what hold in fully opaque chains
      // where origin strings can't discriminate — a sandboxed root's
      // FOREIGN wrapper still fails all three even though both serialize
      // as real-vs-'null' rather than matching.
      if (!trustedOrigin(e)) return;
      if (typeof d.__bundler_need === 'string' && UUID_SHAPE.test(d.__bundler_need)) {
        // Requests are honored only for this document's own child frames.
        if (ownFrameWindows().indexOf(e.source) < 0) return;
        const uuid = d.__bundler_need;
        const text = pageTexts[uuid];
        if (typeof text === 'string') {
          try { e.source.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
          return;
        }
        if (isPageRoot || window.parent === window) return; // authoritative miss
        const waiting = pendingRelays[uuid];
        if (waiting) {
          if (waiting.indexOf(e.source) < 0) waiting.push(e.source);
          return;
        }
        // Never-answered uuids would otherwise accumulate forever under a
        // request spray; past the cap (far above any real page count) new
        // relays are dropped rather than remembered.
        if (Object.keys(pendingRelays).length >= 128) return;
        pendingRelays[uuid] = [e.source];
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      } else if (
        typeof d.__bundler_page === 'string' &&
        UUID_SHAPE.test(d.__bundler_page) &&
        typeof d.__bundler_text === 'string'
      ) {
        // The shape test is load-bearing beyond tidiness: the solicited
        // check below uses the in operator, which matches prototype keys
        // ('__proto__', 'constructor') — an unshaped key would reach
        // deliverPage and throw, painting the error banner.
        // Text is accepted only from the direct parent — the document
        // that minted this one.
        if (e.source !== window.parent || window.parent === window) return;
        if (!(d.__bundler_page in pendingFrames) && !(d.__bundler_page in pendingRelays)) return;
        deliverPage(d.__bundler_page, d.__bundler_text);
      }
    });

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (pageSet.has(uuid)) {
          pageTexts[uuid] = new TextDecoder().decode(finalBytes);
          return;
        }
        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    // Page uuids have no blob here — they ride inside about:blank#<uuid>
    // frame markers the pass below resolves after the swap.
    for (const uuid of uuids) {
      if (pageSet.has(uuid)) continue;
      template = template.split(uuid).join(blobUrls[uuid]);
    }

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);

    // Resolve page-frame markers: mint this document's own blob for each
    // framed page — from local text when this is the root, otherwise by
    // asking the direct parent over the relay protocol above. An
    // unanswered request leaves the frame on about:blank, the same
    // degraded state as a refused embed.
    {
      const MARKER = /^about:blank#([0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12})(#.*)?$/;
      const needed = [];
      for (const el of Array.from(document.querySelectorAll('iframe'))) {
        const m = MARKER.exec(el.getAttribute('src') || '');
        if (!m) continue;
        const text = pageTexts[m[1]];
        if (typeof text === 'string') {
          mountPage(el, m[2] || '', text);
        } else if (window.parent !== window && !isPageRoot) {
          const had = pendingFrames[m[1]];
          (pendingFrames[m[1]] = had || []).push({ el: el, frag: m[2] || '' });
          if (!had) needed.push(m[1]);
        }
      }
      for (const uuid of needed) {
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      }
    }

    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

   <div style=\"font-size:{{ fs16 }};letter-spacing:2px;text-transform:uppercase;color:#FFFFFF;font-weight:700\">Section 08<\u002Fdiv>\n              <sc-for list=\"{{ sec.paragraphs }}\" as=\"p\" hint-placeholder-count=\"2\">\n                <div style=\"font-size:16px;line-height:1.7;color:#FFFFFF;max-width:820px\">{{ p }}<\u002Fdiv>\n              <\u002Fsc-for>\n              <div style=\"border-left:4px solid #FFFFFF;padding-left:24px;margin-top:12px\">\n                <div style=\"font-family:'Roboto',sans-serif;font-weight:700;font-size:clamp(32px,4vw,44px);line-height:1.15;letter-spacing:-1px;color:#FFFFFF\">{{ sec.closingLine }}<\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"font-family:'Roboto',sans-serif;font-weight:400;font-style:italic;font-size:18px;line-height:1.5;color:#c9c7bd\">{{ sec.afterLine }}<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <div style=\"display:grid;grid-template-columns:{{ doubleCols }};gap:20px\">\n\n    <div style=\"min-width:0;border:2px solid #242320;border-radius:16px;padding:24px 28px;display:flex;flex-direction:column;gap:14px;background:#FFFFFF\">\n      <div style=\"font-family:'Roboto',sans-serif;font-weight:700;font-size:16px;letter-spacing:-0.2px\">Resource Allocation<\u002Fdiv>\n      <div style=\"display:flex;gap:20px;align-items:center;justify-content:center;flex-wrap:wrap\">\n        <div style=\"width:110px;height:110px;flex:0 0 auto;border-radius:50%;border:2px solid #242320;background:{{ approachPieGradient }};animation:pie-spin 8s linear infinite\"><\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:10px\">\n          <sc-for list=\"{{ approachBreakdown }}\" as=\"a\" hint-placeholder-count=\"3\">\n            <div style=\"display:flex;align-items:center;gap:9px;font-size:{{ fs16 }};font-weight:700\">\n              <span style=\"width:13px;height:13px;border-radius:4px;border:2px solid #242320;background:{{ a.color }};flex:0 0 auto\"><\u002Fspan>\n              <span style=\"white-space:nowrap\">{{ a.name }} — {{ a.percent }}%<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"min-width:0;border:2px solid #242320;border-radius:16px;padding:24px 28px;display:flex;flex-direction:column;gap:14px;background:#FFFFFF\">\n      <div style=\"font-family:'Roboto',sans-serif;font-weight:700;font-size:16px;letter-spacing:-0.2px\">Features Usage<\u002Fdiv>\n      <div style=\"height:140px;margin-top:auto;display:flex;gap:24px;align-items:flex-end;justify-content:center\">\n        <sc-for list=\"{{ skills }}\" as=\"skill\" hint-placeholder-count=\"3\">\n          <div style=\"display:flex;flex-direction:column;align-items:center;gap:8px;justify-content:flex-end;height:100%\">\n            <div style=\"width:32px;height:{{ skill.level }}%;background:#3452FF;border:2px solid #242320;border-radius:8px 8px 0 0;transition:height 0.8s ease-in-out;flex-shrink:0\"><\u002Fdiv>\n            <div style=\"font-size:{{ fs16 }};font-weight:700;text-align:center;white-space:nowrap\">{{ skill.name }}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n  <\u002Fdiv>\n\n  <div style=\"display:grid;grid-template-columns:{{ tripleCols }};gap:20px\">\n\n    <div style=\"min-width:0;border:2px solid #242320;border-radius:16px;padding:20px 28px;display:flex;flex-direction:column;justify-content:center;gap:10px;background:#FFFFFF\">\n      <div style=\"font-family:'Roboto',sans-serif;font-weight:700;font-size:16px;letter-spacing:-0.2px\">bOS (Brain Operating System)<\u002Fdiv>\n      <div style=\"position:relative;display:flex;align-items:center;justify-content:space-between;gap:20px\">\n        <span style=\"font-weight:700;font-size:{{ fs16 }};white-space:nowrap\">Design<\u002Fspan>\n        <div style=\"position:relative;flex:1;height:2px;background:#242320\">\n          <div style=\"position:absolute;top:50%;left:{{ designPercent }}%;width:20px;height:20px;background:#3452FF;border:2px solid #242320;border-radius:50%;transform:translate(-50%,-50%)\"><\u002Fdiv>\n        <\u002Fdiv>\n        <span style=\"font-weight:700;font-size:{{ fs16 }};white-space:nowrap\">Dev<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"display:flex;justify-content:space-between;font-size:{{ fs16 }};font-weight:700\">\n        <span>{{ designPercent }}%<\u002Fspan>\n        <span>{{ devPercent }}%<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"min-width:0;border:2px solid #242320;border-radius:16px;padding:24px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;text-align:center;background:#3452FF;color:#FFFFFF\">\n      <div style=\"font-family:'Roboto',sans-serif;font-weight:900;font-size:22px;line-height:1.3;color:#FFFFFF\">\"Make ship happens\"<\u002Fdiv>\n      <div style=\"font-size:{{ fs16 }};line-height:1.4;color:#FFFFFF\">— Anabelle Dubois, Design Engineer<\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"min-width:0;border:2px solid #242320;border-radius:16px;padding:20px;display:flex;flex-direction:column;gap:16px;background:#FFFFFF\">\n      <div style=\"display:flex;align-items:center;gap:12px\">\n        <div style=\"font-family:'Roboto',sans-serif;font-weight:700;font-size:{{ fs16 }};letter-spacing:-0.2px\">Bot Scoreboard<\u002Fdiv>\n        <span style=\"width:8px;height:8px;border-radius:50%;background:#3452FF;animation:pulse-dot 1.4s ease-in-out infinite;flex:0 0 auto\"><\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"display:flex;gap:12px;justify-content:space-between\">\n        <sc-for list=\"{{ botStats }}\" as=\"bot\" hint-placeholder-count=\"3\">\n          <div style=\"flex:1;text-align:center;display:flex;flex-direction:column;gap:2px\">\n            <div style=\"font-family:'Roboto',sans-serif;font-weight:900;font-size:22px;color:#3452FF\">{{ bot.count }}<\u002Fdiv>\n            <div style=\"font-size:{{ fs16 }};font-weight:700;white-space:nowrap\">{{ bot.name }}<\u002Fdiv>\n            <div style=\"font-size:11px;color:#9a988f;white-space:nowrap\">Tasks<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n  <\u002Fdiv>\n\n  <div style=\"flex:0 0 auto;display:flex;justify-content:space-between;align-items:center;border-top:2px solid #242320;padding-top:14px\">\n    <div style=\"font-size:{{ fs16 }};letter-spacing:2px;text-transform:uppercase;color:#3452FF;font-weight:700\">Runtime<\u002Fdiv>\n    <div style=\"font-family:'Roboto',sans-serif;font-weight:700;font-size:16px\">20+ years<\u002Fdiv>\n  <\u002Fdiv>\n\n<\u002Fdiv>\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1920,&quot;height&quot;:1080},&quot;name&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Case Studies&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;tagline&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Anabelle Dubois — Design Engineer&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;designPercent&quot;:{&quot;editor&quot;:&quot;range&quot;,&quot;default&quot;:60,&quot;min&quot;:0,&quot;max&quot;:100,&quot;step&quot;:5,&quot;tsType&quot;:&quot;number&quot;}}\">\nclass Component extends DCLogic {\n  state = { active: 'design-systems', expanded: false, livePercent: null, vw: 1920 };\n\n  data = [\n    { key: 'design-systems', abbr: 'Design Systems', title: 'Design Systems - Getty Images & iStock', shortTitle: 'Design Systems', ctaAbbr: 'DS', client: 'Getty Images & iStock',\n      overview: \"Rebuilt the visual backbone for one of the world's largest image libraries: an agent ready, token-driven system now scaling consistently across products, teams, and platforms without breaking a sweat.\",\n      metrics: '40% faster component adoption across teams',\n      businessGoals: 'Scale design consistency across 30+ product teams',\n      fullCopySections: [\n        { type: 'meta', items: [\n          { key: 'Company', value: 'Getty Images' },\n          { key: 'Role', value: 'Principal, Design System Lead' },\n          { key: 'Team', value: 'Product Design Manager, Senior Design System Designer, 1 dedicated engineer' },\n          { key: 'Timeline', value: 'Ongoing, ~1 year across multiple phases' },\n          { key: 'System name', value: 'Elements' },\n          { key: 'Stack', value: 'MUI → Radix migration, token-based theming' },\n          { key: 'Headline outcome', value: \"Consolidated Getty + iStock onto one themeable, token-driven, AI-consumable system with zero disruption to live sites\" },\n        ], note: \"I architected the design system around a token-first foundation not only to enable theming and scalability, but also for AI consumption. Through semantic component architecture, structured documentation, design.md and API-ready conventions, the system was designed to be both human-readable and machine-readable.\" },\n        { type: 'prose', heading: 'Context & Problem', paragraphs: [\n          \"Three separate pressures converged to prompt the rebuild and consolidation of the system.\",\n          \"First, adoption of the existing design system remained low. Although a component library existed, teams often worked outside it, leading to inconsistent experiences and duplicated work.\",\n          \"Second, Getty Images and iStock operated with separate UI languages and design systems. With the planned Shutterstock and Pond5 mergers underway, consolidating both brands into a single, token-first, themeable architecture became an urgent priority to prepare for future scale.\",\n          \"Third, engineering was independently migrating the front end from MUI to Radix, a shift that made this the right moment to rearchitect the design system around the new primitives rather than patch the old one.\",\n        ], aside: \"Although the merger is still pending, the architecture remains a strong, brand-agnostic foundation for future growth.\",\n          visualId: 'getty-before-after', visualPlaceholder: 'Getty + iStock UI before/after — two brands, one system', visualRatio: '1672/845' },\n        { type: 'goals', heading: 'Goals', items: [\n          { label: 'Optimize productivity', sub: 'for both design and engineering workflows', icon: 'target' },\n          { label: 'Decrease inconsistency', sub: 'across products and brands', icon: 'target' },\n          { label: 'Decrease technical debt', sub: 'accumulated from years of one-off builds', icon: 'target' },\n          { label: 'Tokenize for agentic AI', sub: 'a foundation for AI-driven workflows', icon: 'target' },\n          { label: 'Consolidate through theming', sub: 'one system that scales across brands', icon: 'target' },\n          { label: 'Modernize the foundation', sub: 'migrate from MUI to Radix', icon: 'target' },\n        ] },\n        { type: 'process', heading: 'Process', steps: [\n          { num: '1', title: 'Audit first, disrupt nothing', paragraphs: [\n            \"The first step was understanding the current state of the ecosystem before introducing change. I audited Getty Images and iStock products by analyzing production usage and comparing it with the existing component library.\",\n            \"The audit showed that adoption of the previous design system was limited. Most interfaces had been built outside the library, with many patterns implemented as one-off solutions. This meant the challenge wasn't replacing an existing system—it was creating one teams would actually use.\",\n            \"Because Getty Images and iStock were live, revenue-generating products, every architectural change had to preserve the existing user experience. The migration to tokens, themes, and reusable components therefore had to happen incrementally, without disrupting production.\",\n          ] },\n          { num: '2', title: 'Token-first architecture', paragraphs: [\n            \"I built the design system around a token-first architecture for four reasons:\",\n          ], bullets: [\n            'Theming — Getty Images, iStock, and future brands could share the same components while expressing different visual identities through themes',\n            'Scalability — adding a new brand became a theming exercise rather than a redesign or re-engineering effort',\n            'Platform agnostic — tokens separate design decisions from implementation, making the system portable across web, mobile, and future platforms',\n            'AI-ready — semantic tokens, structured naming, and documentation make the system easier for AI tools to interpret and generate from',\n          ], closing: \"To support this architecture, I migrated the component foundation from MUI to Radix. Moving from a styled component library to headless primitives provided greater control over theming, accessibility, and long-term flexibility while allowing the same components to serve multiple brands.\",\n            visualId: 'getty-mui-radix', visualPlaceholder: 'MUI → Radix component comparison' },\n          { num: '3', title: 'Rethinking documentation', paragraphs: [\n            \"Design system documentation has traditionally lived in Figma prototypes or dedicated platforms like ZeroHeight. As the system grew, I found both approaches increasingly cumbersome to maintain. Documentation became fragmented, slower to update, and harder to keep aligned with the design system as it evolved.\",\n            \"To address this, I built an AI-assisted documentation workflow using Claude and am developing a self-hosted documentation site. Documentation stays closer to the source of truth, is easier to maintain, and is structured for both human readers and AI tools.\",\n          ] },\n        ] },\n        { type: 'culture', heading: 'Driving adoption', intro: \"Building the design system was only part of the work. Equally important was helping teams adopt it in their everyday workflows.\\n\\nPeople naturally rely on familiar ways of working, so I approached adoption through education rather than enforcement. My goal was to help designers understand not only how to use the system, but why it was designed the way it was.\\n\\nTo support this, I developed a series of initiatives:\",\n          bullets: [\n            'Training sessions covering design tokens, the migration from MUI to Radix, component properties, and a function-first approach to selecting components based on behavior rather than appearance',\n            'Design System Hour, recurring hands-on workshops where one representative from each product team could bring real design challenges, ask questions, and explore the system together',\n            'An adoption dashboard, built from Figma Analytics, to measure library usage, monitor adoption trends, and identify opportunities for future training',\n          ],\n          closing: \"One recurring observation was that designers often created custom layouts first and looked for matching components afterward. Through ongoing training and collaboration, I encouraged a shift toward designing with the system from the start—using components as the foundation rather than adapting them after the fact.\",\n          quote: \"A design system succeeds when it becomes part of the team's mindset, not just their toolkit.\",\n          afterQuote: \"\" },\n        { type: 'impact', heading: 'Impact — By the Numbers', intro: \"From the beginning, I wanted adoption to be measurable rather than anecdotal. I built an analytics dashboard powered by Figma Analytics to track the health of the design system across three key indicators:\",\n          introBullets: [\n            'Adoption — teams actively using the system',\n            'Reliance — new component insertions, indicating engagement and trust',\n            'Footprint — component instances across files, reflecting long-term integration',\n          ],\n          introClosing: \"This data informed training priorities, identified adoption opportunities, and helped demonstrate the system's impact over time.\",\n          statsLabel: 'May 2026, strongest month to date',\n          statsCols: 'repeat(3,1fr)',\n          trendVisualId: 'getty-trend-chart', trendVisualRatio: '1200/978', trendVisualPlaceholder: 'Month-over-month trend — Adoption, Reliance, Footprint (May → June)',\n          stats: [\n            { value: '+40%', label: 'Team adoption' },\n            { value: '+26.7%', label: 'Reliance', sub: 'component insertions' },\n            { value: '+25%', label: 'Footprint', sub: 'component instances' },\n          ],\n          note: 'Getty and iStock legacy footprint declined in parallel — exactly the migration pattern a healthy system should show: usage shifting off legacy libraries and onto Elements.',\n          callout: \"The following month introduced a natural check on that momentum: adoption held steady at 7 teams (no regression), footprint kept growing (+10.2%), but override rates rose — concentrated almost entirely in a handful of components (Chip, Badge, Link, one icon, and Tab). Rather than reading this as a setback, I'm treating it as the instrumentation doing exactly its job: surfacing precisely where the library is missing variants or flexibility, which now feeds directly into the next iteration cycle and the ongoing training push. The data pipeline itself — going from \\\"we have no idea what's being used\\\" to \\\"we know exactly which five components need attention\\\" — is, in a real sense, the impact.\" },\n        { type: 'next', heading: \"What's Next\",\n          now: \"Today, Elements powers Getty Images and iStock through a single, scalable design system. Built on tokens, semantic components, and AI-ready documentation, the architecture is designed to evolve with new brands, new platforms, and new ways of building digital products.\",\n          priorities: [\n            'Deepening documentation — finishing the self-hosted docs site and continuing the AI-enhanced authoring workflow',\n            'Tightening tokens and semantics — so API-driven and agentic connections work seamlessly',\n            'Continuing the training cadence — to close the specific override gaps the analytics are surfacing',\n          ] },\n        { type: 'reflection', heading: 'Reflection',\n          paragraphs: [\n            \"The biggest takeaway for me was that design systems are ultimately about enablement. Components matter, but lasting adoption comes from combining thoughtful architecture with documentation, education, and a shared way of working.\",\n          ],\n          closingLine: 'Two libraries, one backbone, scaling without breaking a sweat.',\n          afterLine: \"Components create consistency. Adoption creates impact.\" },\n      ],\n      tags: ['Design Tokens', 'Component Library', 'Governance'] },\n    { key: 'ux-design', abbr: 'UX\\nDesign', title: 'UX Design', shortTitle: 'UX Design', ctaAbbr: 'UX', client: 'ServiceNow Enterprise Transformation',\n      overview: 'A research-led enterprise HR redesign around information architecture, taxonomy, content models, and service workflows.',\n      metrics: '-28% support tickets after launch',\n      businessGoals: 'Simplify energy management for 4M+ customers',\n      fullCopySections: [\n        { type: 'meta', items: [\n          { key: 'Company', value: 'Hydro-Québec' },\n          { key: 'Role', value: 'Lead Product Designer' },\n          { key: 'Team', value: 'Product Design Manager, Product Owner, HR stakeholders, IT/ServiceNow implementation partners, content writers' },\n          { key: 'Timeline', value: 'Multi-phase digital HR transformation, ~9 months' },\n          { key: 'Project name', value: 'HR Service Hub (on ServiceNow)' },\n          { key: 'Stack', value: 'ServiceNow, migrated off SAP and legacy in-house HR sites' },\n          { key: 'Headline outcome', value: 'Shifted the transformation strategy from platform-first to content-first.' },\n        ], note: \"Helped leadership recognize that ServiceNow could only be as effective as the structured data and content behind it. Guided the team toward investing in information architecture, content governance, and data quality instead of expecting a new platform to solve legacy problems.\" },\n        { type: 'prose', heading: 'Context & Problem', oneColumn: true, paragraphs: [\n          \"Three pressures converged to shape this project.\",\n        ], bullets: [\n          \"Hydro-Québec was in the middle of a digital HR transformation: migrating off SAP and a patchwork of in-house sites onto a single platform\",\n          \"Leadership wanted to optimize HR tasks and workflows with AI-assisted tooling, not just replatform what already existed\",\n          \"The new ticketing and HR platform, built on ServiceNow, had to serve four very different audiences at once: HR agents, admin support agents, managers, and employees\",\n        ], aside: \"The platform implementation exposed an information architecture problem rather than a technology problem.\",\n          visualId: 'hq-nav-friction', visualPlaceholder: 'HR Service Hub navigation, before/after content restructure', visualRatio: '1672/941' },\n        { type: 'goals', heading: 'Goals', items: [\n          { label: 'Consolidate the platform', sub: 'migrate off SAP and in-house sites into ServiceNow', icon: 'target' },\n          { label: 'Optimize with AI', sub: 'streamline HR tasks and workflows with AI-assisted tooling', icon: 'target' },\n          { label: 'Personalised experience', sub: '4 segments: HR agents, admin support agents, managers, and employees', icon: 'target' },\n          { label: 'Decrease HR tickets', sub: 'significantly reduce ticket volume', icon: 'target' },\n        ] },\n        { type: 'process', heading: 'Process', steps: [\n          { num: '1', title: 'Research across four personas', paragraphs: [\n            \"I ran interviews with 60 participants across four personas: HR agents, admin support agents, managers, and employees, to understand how each group actually experienced HR support.\",\n          ] },\n          { num: '2', title: 'Card sorting & journey mapping', paragraphs: [\n            \"Based on the research, I ran card sorting workshops to tackle the navigation friction users were describing, then journey mapping workshops to target the highest-friction paths for each persona.\",\n          ] },\n          { num: '3', title: 'Consolidating content for ServiceNow', paragraphs: [\n            \"The research also surfaced a huge amount of disparate HR content scattered across SAP and legacy sites. I gathered and restructured it into a consolidated article base built to power ServiceNow.\",\n          ] },\n          { num: '4', title: 'Designing taxonomy & information architecture', paragraphs: [\n            \"In collaboration with the AI team, I defined the taxonomy and information architecture that transformed fragmented HR content into a structured knowledge model for ServiceNow.\",\n          ] },\n          { num: '5', title: 'Supporting knowledge authoring with AI', paragraphs: [\n            \"I helped design an AI writing assistant that guided users in writing consistent, structured HR content, reducing the effort required to maintain the knowledge base.\",\n          ] },\n        ] },\n        { type: 'culture', heading: 'Driving adoption', intro: \"The hardest part of the project was helping stakeholders understand why ServiceNow wasn't delivering the experience they expected. The platform had been implemented, but much of the underlying content ecosystem, including the service catalog, knowledge articles, and information structure, was incomplete or inconsistent. When employees couldn't find answers or services, the technology was often assumed to be the problem.\\n\\nMy role was to shift that perspective. ServiceNow could only surface, search, and automate the information available to it. Without a well-structured service catalog, taxonomy, and knowledge content, the platform had very little to work with.\",\n          bullets: [\n            'Reframed the challenge from a technology problem to an information architecture and content strategy challenge',\n            'Advocated for a structured, searchable service catalog and knowledge ecosystem as the foundation for ServiceNow, SEO, GEO, and AI-powered retrieval',\n            'Partnered with the AI team to design the taxonomy and information architecture supporting both services and knowledge',\n            'Helped develop an AI writing assistant to accelerate the creation of structured, consistent content across the platform',\n            'Trained stakeholders so the content-first mindset continued beyond the initial implementation',\n          ],\n          closing: \"Once stakeholders understood that the platform was only as powerful as the information behind it, the conversation shifted away from finding a \\\"better system\\\" and toward building a scalable, structured information foundation.\",\n          quote: \"Technology amplifies information. If the foundation isn't structured, no platform can compensate.\",\n          afterQuote: \"\" },\n        { type: 'impact', heading: 'Impact — By the Numbers', intro: \"Research uncovered that the biggest opportunity wasn't implementing another platform, but creating the information foundation it depended on. The work focused on simplifying the service model and structuring HR knowledge into a scalable ecosystem.\",\n          introBullets: [\n            '4 personas → 2 behavioral personas, simplifying the service catalog, navigation, and content model while enabling broader profile tagging for more personalized experiences.',\n            '~100 navigation sections → 20 taxonomy-driven categories, creating a scalable information architecture',\n            'From barely any to hundreds of HR articles consolidated into a structured ServiceNow knowledge base',\n          ],\n          introClosing: \"This work transformed fragmented HR information into a structured service ecosystem that could support ServiceNow, enterprise search, and future AI-powered experiences.\",\n          statsLabel: 'AI-Ontology Map: Entities, Relationships, and Key Concepts',\n          statsCols: 'repeat(3,1fr)',\n          trendVisualId: 'hq-content-shift', trendVisualRatio: '1536/1024', trendVisualPlaceholder: 'Engagement trend — before/after the content-first strategy',\n          stats: [\n            { value: '2', label: 'Behavioral personas', sub: '4 to 2 personas, simplifying the content model' },\n            { value: '20', label: 'Navigation Taxonomy', sub: '~100 → 20 taxonomy-driven categories, optimizing discoverability' },\n            { value: '100s', label: 'knowledge articles', sub: 'From a sparse knowledge base to hundreds of structured HR articles.' },\n          ],\n          note: \"Low engagement had persisted through prior technology-only fixes. The shift only came once the organization treated content structure, not UI or platform features, as the product.\",\n          callout: \"The recurring pattern: stakeholders kept reaching for another technical fix when engagement stayed flat. Reframing the problem as content and findability, rather than interface or technology, is what unlocked the conversation, and eventually adoption.\" },\n        { type: 'next', heading: \"What's Next\",\n          now: \"With the service catalog, taxonomy, and knowledge ecosystem in place, the next opportunity is elevating the employee experience through a stronger visual identity, refined UI, and AI-powered capabilities.\",\n          priorities: [\n            'Bringing a cohesive visual identity and polished UI to the ServiceNow experience',\n            'Expanding AI-powered assistance across services and knowledge',\n            'Tracking usage and satisfaction to guide continuous improvements',\n          ] },\n        { type: 'reflection', heading: 'Reflection',\n          paragraphs: [\n            \"The biggest outcome wasn't a redesigned interface. It was changing how the organization thought about information. Once the service catalog, taxonomy, and knowledge base became the product, ServiceNow, and future AI capabilities, finally had the foundation they needed.\",\n          ],\n          closingLine: 'The platform was never the problem. The content was.',\n          afterLine: \"Structure and findability drive adoption. Technology alone doesn't.\" },\n      ],\n      tags: ['Research', 'Service Design', 'Accessibility'] },\n    { key: 'development', abbr: 'Dev', title: 'Development', shortTitle: 'Development', ctaAbbr: 'Dev', client: 'Grrunch App',\n      overview: 'A Rails-based grocery price-comparison engine that scrapes, normalizes, and tracks retailer prices over time.',\n      metrics: '52% average savings across sampled products',\n      businessGoals: 'Prove out a price-comparison engine across three grocery banners',\n      fullCopySections: [\n        { type: 'meta', items: [\n          { key: 'Institution', value: 'Le Wagon Coding Bootcamp' },\n          { key: 'Role', value: 'Full-Stack Developer' },\n          { key: 'Team', value: 'Team of 4 full-stack developers, Le Wagon' },\n          { key: 'Timeline', value: '~450 hours, or 4 full-time months' },\n          { key: 'Application name', value: 'Grrunch', link: 'https://www.grrunch.com/' },\n          { key: 'Stack', value: 'Ruby on Rails, PostgreSQL, Hotwire, Web Scraping, HTML/CSS/JavaScript' },\n          { key: 'Headline outcome', value: 'Built a grocery price-comparison engine that scrapes, normalizes, and tracks live retailer prices over time' },\n        ], note: \"The project that turned me from designer into design engineer.\" },\n        { type: 'prose', heading: 'Context & Problem', oneColumn: true, paragraphs: [\n          \"Grocery prices in Quebec fluctuate constantly, and even banners under the same parent company price independently, store by store.\",\n        ], bullets: [\n          \"Loblaws, Maxi, and Provigo are all Loblaw Companies Ltd. brands, but each prices independently per store, with no single place to see whether the \\\"discount\\\" banner is actually cheaper for a given product on a given day\",\n          \"Retailer search results are client-rendered SPAs, so getting reliable pricing data meant scraping fully-rendered pages, not calling an API\",\n          \"A single product listing can expose up to four different price fields depending on promotions and loyalty programs, so raw scraped data isn't directly comparable\",\n        ], aside: \"Grrunch's premise: scrape the same basket of everyday items across all three retailers, store every price observation over time, and let a shopper search a product and immediately see which store, and which historical price point, is the best deal.\",\n          visualId: 'grrunch-context', visualPlaceholder: 'Grrunch price comparison results screen', visualRatio: '1536/1024' },\n        { type: 'goals', heading: 'Goals', items: [\n          { label: 'Compare across banners', sub: 'Loblaws, Maxi, and Provigo, priced independently per store', icon: 'target' },\n          { label: 'Track price history', sub: 'store every observation over time, not just the current price', icon: 'target' },\n          { label: 'Normalize messy data', sub: 'collapse up to four price fields into one comparable number', icon: 'target' },\n          { label: 'Decouple the scraper', sub: 'run scraping as an offline batch job, not inside the request cycle', icon: 'target' },\n        ] },\n        { type: 'process', heading: 'Process', steps: [\n          { num: '1', title: 'Architecture', paragraphs: [\n            \"I built the application in Ruby on Rails with a simple, end-to-end architecture. My goal wasn't to experiment with frameworks, but to understand how the frontend, backend, database, and business logic work together as one product.\",\n          ] },\n          { num: '2', title: 'Decoupling the scraper', paragraphs: [\n            \"Scraping retailer websites is slow and unpredictable, so I separated data collection from the application itself. The scraper runs independently, collects fresh pricing data, and imports it into PostgreSQL, making development faster, more reliable, and repeatable.\",\n          ] },\n          { num: '3', title: 'Data model', paragraphs: [\n            \"Five normalized tables let one product carry many price observations across stores and time: products, stores, product_prices, users/lists, and pg_search_documents. product_prices does the real work: every scrape appends a new row instead of overwriting one, so each product/store pair builds up a price history.\",\n          ] },\n          { num: '4', title: 'The scraping pipeline', paragraphs: [\n            \"The scraper collects pricing data from multiple retailer websites, then normalizes inconsistent formats into a single comparable dataset. Sponsored products and incomplete records are filtered out to keep the data reliable.\",\n          ] },\n        ] },\n        { type: 'culture', heading: 'Price Analytics', intro: \"The comparison logic itself lives on the ProductPrice model: average_price, highest_price, and lowest_price each pull every observation for a product/store pair and derive a summary figure, then feed it through a shared percentage method that recomputes a unit price proportionally to whatever aggregate price is being displayed.\",\n          bullets: [\n            'Keeping that logic on the model kept the rest of the app simple, the page that lists products just filters and sorts based on what the user searches for',\n            'Search looks across both product name and brand at once, so a query finds a match no matter which field it hits',\n          ],\n          closing: \"\",\n          quote: \"Good analytics start with good data.\",\n          afterQuote: \"\" },\n        { type: 'impact', heading: 'Impact — By the Numbers', intro: \"The proof of concept demonstrated that using Grrunch, comparing similar grocery products instead of retailer promotions, could reduce basket costs by an average of 52%.\",\n          introBullets: [],\n          introClosing: \"\",\n          statsLabel: 'MVP sample results',\n          statsCols: '1fr',\n          trendVisualId: 'grrunch-trend', trendVisualRatio: '1126/900', trendVisualPlaceholder: 'Grrunch price comparison sample results',\n          stats: [\n            { value: '52%', label: 'Average savings', sub: 'across a dozen products, three grocery banners' },\n          ],\n          note: '',\n          callout: \"Like most web-scraping projects, Grrunch has limitations.\\n\\nThe scraper depends on retailer page structures, so website changes require updates to the extraction logic. Search quality also depends on how consistently retailers describe their products, making normalization an ongoing challenge.\\n\\nIf the project were expanded further, I would explore:\",\n          calloutBullets: [\n            'Scheduled automated scraping',\n            'More advanced product matching',\n            'Improved retailer normalization',\n            'Larger-scale performance optimization',\n            'Richer pricing analytics',\n          ] },\n        { type: 'next', heading: \"What's Next\",\n          now: \"The next step is leveraging AI-enhanced workflows to bring Grrunch up to speed, and testing whether there's real value in it as grocery prices keep climbing.\",\n          priorities: [\n            'Rebuilding parts of the workflow with AI-enhanced tooling',\n            'Validating real-world value as grocery prices continue to rise',\n          ] },\n        { type: 'reflection', heading: 'Reflection',\n          paragraphs: [\n            \"Grrunch was the project that transformed me into a Design Engineer. Owning the product end to end taught me how every layer, from data collection and modeling to the interface, shapes the final user experience.\",\n          ],\n          closingLine: 'This project made me realize how much I love building products end-to-end: from the database schema to the UI, and everything in between!',\n          afterLine: \"Understanding back to front changes how you design.\" },\n      ],\n      tags: ['Ruby on Rails', 'PostgreSQL', 'Web Scraping'] },\n  ];\n\n  skills = [\n    { name: 'Overthinking', level: 8 },\n    { name: 'Prototyping', level: 92 },\n    { name: 'Shipping', level: 100 },\n  ];\n\n  approachBreakdown = [\n    { name: 'Design', percent: 25, color: '#3452FF' },\n    { name: 'Prototype', percent: 25, color: '#8CA0FF' },\n    { name: 'Delegate to machine', percent: 50, color: '#242320' },\n  ];\n\n  botStatsStart = [\n    { name: 'Scout', count: 340 },\n    { name: 'Hunter', count: 215 },\n    { name: 'Scribe', count: 480 },\n  ];\n  botStats = this.botStatsStart.map(b => ({ ...b }));\n\n  componentDidMount() {\n    this._t0 = Date.now();\n    const tick = () => {\n      const base = this.props.designPercent ?? 65;\n      const t = (Date.now() - this._t0) / 1000;\n      const w = t * (Math.PI / 0.8);\n      const wave = Math.sin(w) + 0.15 * Math.sin(3 * w);\n      this.setState({ livePercent: Math.max(5, Math.min(95, base + wave * 20)) });\n      this._driftRaf = requestAnimationFrame(tick);\n    };\n    this._driftRaf = requestAnimationFrame(tick);\n\n    this.setState({ skillPhase: 0 });\n    this._skillTick = setInterval(() => {\n      this.setState(s => ({ skillPhase: s.skillPhase ? 0 : 1 }));\n    }, 800);\n\n    this._liveTick = setInterval(() => {\n      const i = Math.floor(Math.random() * this.botStats.length);\n      if (this.botStats[i].count >= 999) {\n        this.botStats = this.botStatsStart.map(b => ({ ...b }));\n      } else {\n        this.botStats[i].count += 1;\n      }\n      this.forceUpdate();\n    }, 2200);\n\n    this.setState({ vw: window.innerWidth });\n    this._onResize = () => this.setState({ vw: window.innerWidth });\n    window.addEventListener('resize', this._onResize);\n  }\n\n  componentWillUnmount() {\n    clearInterval(this._liveTick);\n    cancelAnimationFrame(this._driftRaf);\n    clearInterval(this._skillTick);\n    window.removeEventListener('resize', this._onResize);\n  }\n\n  toggle(key) {\n    this.setState(s => ({ active: s.active === key ? null : key, expanded: s.active === key ? false : s.expanded }));\n  }\n\n  toggleExpanded() {\n    this.setState(s => ({ expanded: !s.expanded }));\n  }\n\n  renderVals() {\n    const active = this.state.active;\n    const activeData = this.data.find(d => d.key === active);\n\n    const vw = this.state.vw || 1920;\n    const stacked = vw < 900;\n    const heroStacked = vw < 600;\n    const fs16 = stacked ? '14px' : '16px';\n\n    const toggles = this.data.map(d => {\n      const isActive = active === d.key;\n      return {\n        abbr: d.abbr,\n        onClick: () => this.toggle(d.key),\n        bg: isActive ? '#3452FF' : '#FFFFFF',\n        dotColor: isActive ? '#FFFFFF' : '#3452FF',\n        dotTop: stacked ? (isActive ? '29px' : 'calc(100% - 29px)') : (isActive ? '38px' : 'calc(100% - 38px)'),\n      };\n    });\n\n    return {\n      name: this.props.name || 'Case Studies',\n      tagline: this.props.tagline || 'Anabelle Dubois — Design Engineer',\n      designPercent: Math.round(this.state.livePercent ?? (this.props.designPercent ?? 65)),\n      devPercent: 100 - Math.round(this.state.livePercent ?? (this.props.designPercent ?? 65)),\n      skills: this.skills.map(s => ({\n        ...s,\n        level: s.name === 'Overthinking' ? (this.state.skillPhase ? 100 : 5)\n          : s.name === 'Prototyping' ? (this.state.skillPhase ? 5 : 100)\n          : s.name === 'Shipping' ? (this.state.skillPhase ? 5 : 100)\n          : s.level,\n      })),\n      toggles,\n      activeStudy: activeData ? { ...activeData, fullCopySections: activeData.fullCopySections.map(s => ({ ...s, isMeta: s.type === 'meta', isBridge: s.type === 'bridge', isProse: s.type === 'prose', isGoals: s.type === 'goals', isProcess: s.type === 'process', isCulture: s.type === 'culture', isImpact: s.type === 'impact', isNext: s.type === 'next', isReflection: s.type === 'reflection', isPlain: !s.type, introParagraphs: s.intro ? s.intro.split('\\n\\n') : [], nowParagraphs: s.now ? s.now.split('\\n\\n') : [], singleCol: s.oneColumn ? 1 : (stacked ? 1 : 2), cultureCols: stacked ? 1 : 2, statsCols: stacked ? '1fr' : s.statsCols })) } : { metrics: 'Select a case study above', businessGoals: '—', title: '', shortTitle: '', client: '', overview: '', fullCopySections: [], tags: [] },\n      expanded: this.state.expanded && !!activeData,\n      notExpanded: !(this.state.expanded && !!activeData),\n      toggleExpanded: () => this.toggleExpanded(),\n      expandButtonLabel: 'Read Case Study',\n      chevronRotation: this.state.expanded ? 135 : 45,\n      approachBreakdown: this.approachBreakdown,\n      approachPieGradient: (() => {\n        let acc = 0;\n        const stops = this.approachBreakdown.map(a => {\n          const start = acc; acc += a.percent;\n          return a.color + ' ' + start + '% ' + acc + '%';\n        });\n        return 'conic-gradient(' + stops.join(', ') + ')';\n      })(),\n      botStats: this.botStats,\n      fs16,\n      tripleCols: stacked ? '1fr' : '1fr 1fr 1fr',\n      proseColCount: stacked ? 1 : 2,\n      doubleCols: stacked ? '1fr' : '1fr 1fr',\n      quadCols: stacked ? '1fr' : '1fr 1fr 2fr',\n      metaCols: stacked ? '1fr' : '200px 1fr',\n      metaGap: stacked ? '6px' : '24px',\n      processCols: stacked ? '1fr' : '80px 1fr',\n      processGap: stacked ? '10px' : '28px',\n      nextCols: stacked ? '1fr' : '1.3fr 1fr',\n      nextGap: stacked ? '24px' : '48px',\n      heroDir: heroStacked ? 'column' : 'row',\n      heroSideFlex: heroStacked ? '0 0 auto' : '1 1 50%',\n      heroPadBottom: heroStacked ? '24px' : '0',\n      heroDividerFlex: heroStacked ? '0 0 0' : '0 0 2px',\n      heroBorderLeft: heroStacked ? 'none' : '2px solid #242320',\n      heroBorderBottom: heroStacked ? '2px solid #242320' : 'none',\n      pagePadding: heroStacked ? '24px 14px' : (stacked ? '32px 32px' : '40px 56px'),\n    };\n  }\n}\n\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
